name: Agent Team

on:
  schedule:
    # 每个交易日 UTC 0 点运行 (北京时间 8 点)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - emergency

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyyaml

      - name: Run Agent Team
        run: |
          python -m agents.cli --mode ${{ inputs.mode || 'daily' }}
        env:
          PYTHONUNBUFFERED: 1

      - name: Upload agent reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-reports
          path: reports/agents/
          retention-days: 30

      - name: Create GitHub Issue (if errors)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportFiles = fs.readdirSync('reports/agents');
            let errorDetails = '';
            for (const file of reportFiles) {
              const content = fs.readFileSync(`reports/agents/${file}`, 'utf8');
              errorDetails += `\n\`\`\`json\n${file}\n${content}\n\`\`\`\n`;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Agent Team 运行失败 - ${new Date().toISOString().split('T')[0]}`,
              body: `## Agent Team 运行错误报告

运行模式：${{ inputs.mode || 'daily' }}
运行时间：${new Date().toISOString()}

### 详细报告

${errorDetails}

---
*此 Issue 由 Agent Team 自动创建*`,
              labels: ['agent-team', 'error', 'auto-generated']
            });
