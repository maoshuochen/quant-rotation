name: Sync Frontend Pages Artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/frontend-pages-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "frontend-pages-sync"
  cancel-in-progress: true

jobs:
  sync-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Prepare public data files
        run: |
          mkdir -p web/public

          for file in data.json ranking.json backtest.json history.json; do
            if [ -f "$file" ]; then
              cp "$file" "web/public/$file"
            fi
          done

          if [ ! -f "web/public/data.json" ]; then
            echo '{"backtest":{"summary":{},"chart_data":[]},"history":[],"ranking":[],"recommendation":{},"health":{},"universe":{},"update_time":"","market_regime":"","market_regime_desc":""}' > web/public/data.json
          fi
          if [ ! -f "web/public/ranking.json" ]; then
            echo '{"ranking":[],"recommendation":{},"health":{},"universe":{},"update_time":"","market_regime":"","market_regime_desc":""}' > web/public/ranking.json
          fi
          if [ ! -f "web/public/backtest.json" ]; then
            echo '{"summary":{},"chart_data":[]}' > web/public/backtest.json
          fi
          if [ ! -f "web/public/history.json" ]; then
            echo '{"history":[],"update_time":""}' > web/public/history.json
          fi

      - name: Install dependencies
        run: |
          cd web
          npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Sync build output to Pages root
        run: |
          rm -rf assets
          cp -R web/dist/assets ./assets
          cp web/dist/index.html ./index.html
          cp web/dist/vite.svg ./vite.svg

          for file in data.json ranking.json backtest.json history.json; do
            if [ -f "web/dist/$file" ]; then
              cp "web/dist/$file" "./$file"
            fi
          done

      - name: Commit and push synced artifacts
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add index.html vite.svg assets/ web/dist/ data.json ranking.json backtest.json history.json web/public/data.json web/public/ranking.json web/public/backtest.json web/public/history.json
          git diff --staged --quiet || git commit -m "chore: sync frontend pages artifacts"
          git push origin main
