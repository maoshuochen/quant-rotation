name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ==================== 代码检出 ====================
      - name: Checkout
        uses: actions/checkout@v4

      # ==================== Node 环境 ====================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: |
          cd web
          npm ci --prefer-offline --no-audit --no-fund

      # ==================== 数据文件检查 ====================
      # 注意：web/dist/ranking.json 等数据文件由 backtest.yml 生成并提交
      # 这里直接使用已有的数据文件，不需要重新运行 Python 脚本
      - name: Check data files
        run: |
          echo "Checking data files in web/dist/..."
          ls -la web/dist/ || echo "web/dist/ does not exist yet"

          if [ ! -f "web/dist/ranking.json" ]; then
            echo "::warning::web/dist/ranking.json not found, creating placeholder"
            mkdir -p web/dist && echo '{"ranking":[]}' > web/dist/ranking.json
          fi
          if [ ! -f "web/dist/history.json" ]; then
            echo "::warning::web/dist/history.json not found, creating placeholder"
            echo '{"history":[]}' > web/dist/history.json
          fi
          if [ ! -f "web/dist/backtest.json" ]; then
            echo "::warning::web/dist/backtest.json not found, creating placeholder"
            echo '{"summary":{}}' > web/dist/backtest.json
          fi
          echo "Data files ready!"

      # ==================== 前端构建 ====================
      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules/.vite
            ~/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('web/package-lock.json', 'web/src/**') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Build frontend
        run: |
          cd web
          npm run build

      # ==================== 部署到 GitHub Pages ====================
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
