name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    # 每天 UTC 0 点运行 (北京时间 8 点)
    - cron: '0 0 * * 1-5'  # 工作日运行
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 环境配置
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd web && npm ci

      - name: Cache data
        uses: actions/cache@v4
        with:
          path: |
            data/
          key: quant-data-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            quant-data-${{ runner.os }}-

      - name: Run backtest
        run: |
          mkdir -p backtest_results data/raw
          # 始终运行全量回测确保数据一致性
          python scripts/backtest_baostock.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Generate data
        run: |
          python scripts/generate_web_data.py
          python scripts/generate_history_data.py
          python scripts/generate_backtest_json.py

      - name: Extract results
        id: collect
        run: |
          python -c "
          import pandas as pd
          df = pd.read_parquet('backtest_results/current.parquet')
          latest = df.iloc[-1]
          prev = df.iloc[-2] if len(df) > 1 else latest
          daily_return = (latest['value'] - prev['value']) / prev['value'] * 100
          total_return = (latest['value'] - df.iloc[0]['value']) / df.iloc[0]['value'] * 100
          print(f'DAILY_RETURN={daily_return:.4f}')
          print(f'TOTAL_RETURN={total_return:.4f}')
          print(f'NAV={latest[\"value\"]:.2f}')
          print(f'DATE={latest[\"date\"]}')
          " >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send notification (optional)
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          python -c "
          import os
          import requests

          token = os.environ.get('TELEGRAM_BOT_TOKEN')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID')

          if not token or not chat_id:
              print('Telegram 配置缺失，跳过通知')
              exit(0)

          daily = '${{ steps.collect.outputs.DAILY_RETURN }}'
          total = '${{ steps.collect.outputs.TOTAL_RETURN }}'
          nav = '${{ steps.collect.outputs.NAV }}'
          date = '${{ steps.collect.outputs.DATE }}'

          message = f'''
          📊 量化轮动日报

          日期：{date}
          单位净值：{nav}
          日涨跌：{daily}%

          运行详情：https://github.com/maoshuochen/quant-rotation/actions
          '''

          url = f'https://api.telegram.org/bot{token}/sendMessage'
          requests.post(url, json={
              'chat_id': chat_id,
              'text': message.strip()
          })
          " 2>/dev/null || echo "Notification failed"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
