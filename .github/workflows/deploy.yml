name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    # 每天 UTC 0 点运行 (北京时间 8 点)
    - cron: '0 0 * * 1-5'  # 工作日运行
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true  # 新推送自动取消旧运行，避免超时和资源浪费

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # 环境配置
    # 注释 environment 以避免 GitHub Pages 环境审批
    # environment:
    #   name: github-pages
    #   url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 获取前一个 commit 用于增量比较

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            __pycache__/
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-
            ${{ runner.os }}-pip-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node dependencies
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install Node dependencies
        run: |
          cd web
          npm ci --prefer-offline --no-audit --no-fund

      - name: Cache raw data (ETF history, Northbound)
        uses: actions/cache@v4
        with:
          path: data/raw/
          # 数据缓存按月份划分，不依赖代码哈希，提高缓存命中率
          key: quant-rawdata-${{ runner.os }}-${{ hashFiles('data/raw/*.parquet') }}
          restore-keys: |
            quant-rawdata-${{ runner.os }}-

      - name: Cache backtest results
        uses: actions/cache@v4
        with:
          path: backtest_results/
          # 回测结果缓存，用于增量回测
          key: quant-backtest-${{ runner.os }}-${{ hashFiles('backtest_results/*.parquet') }}
          restore-keys: |
            quant-backtest-${{ runner.os }}-

      - name: Check for incremental backtest
        id: backtest_check
        run: |
          if [ -f "backtest_results/current.parquet" ]; then
            LAST_DATE=$(python -c "import pandas as pd; df = pd.read_parquet('backtest_results/current.parquet'); print(df.iloc[-1]['date'])" 2>/dev/null || echo "")
            TODAY=$(date -u +%Y-%m-%d)
            if [ "$LAST_DATE" = "$TODAY" ]; then
              echo "INCREMENTAL=true" >> $GITHUB_OUTPUT
              echo "Latest data already exists for $TODAY"
            else
              echo "INCREMENTAL=false" >> $GITHUB_OUTPUT
              echo "Need to update data (last: $LAST_DATE, today: $TODAY)"
            fi
          else
            echo "INCREMENTAL=false" >> $GITHUB_OUTPUT
            echo "No existing backtest results, running full backtest"
          fi

      - name: Run incremental backtest
        if: steps.backtest_check.outputs.incremental == 'true'
        run: |
          echo "Running incremental update..."
          python scripts/backtest_incremental.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Run full backtest
        if: steps.backtest_check.outputs.incremental == 'false'
        run: |
          mkdir -p backtest_results data/raw
          python scripts/backtest_baostock.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules/.vite
            ~/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('web/package-lock.json', 'web/src/**') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Generate data
        run: |
          python scripts/generate_web_data.py
          python scripts/generate_history_data.py
          python scripts/generate_backtest_json.py

      - name: Validate backtest results
        run: |
          python scripts/validate_backtest_results.py

      - name: Run unit tests
        run: |
          # 只运行核心模块测试（避免需要额外依赖的测试）
          python -m pytest tests/test_portfolio.py tests/test_config_loader.py -v --tb=short

      - name: Extract results
        id: collect
        run: |
          python -c "
          import pandas as pd
          df = pd.read_parquet('backtest_results/current.parquet')
          latest = df.iloc[-1]
          prev = df.iloc[-2] if len(df) > 1 else latest
          daily_return = (latest['value'] - prev['value']) / prev['value'] * 100
          total_return = (latest['value'] - df.iloc[0]['value']) / df.iloc[0]['value'] * 100
          print(f'DAILY_RETURN={daily_return:.4f}')
          print(f'TOTAL_RETURN={total_return:.4f}')
          print(f'NAV={latest[\"value\"]:.2f}')
          print(f'DATE={latest[\"date\"]}')
          " >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send notification (optional)
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          python -c "
          import os
          import requests

          token = os.environ.get('TELEGRAM_BOT_TOKEN')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID')

          if not token or not chat_id:
              print('Telegram 配置缺失，跳过通知')
              exit(0)

          daily = '${{ steps.collect.outputs.DAILY_RETURN }}'
          total = '${{ steps.collect.outputs.TOTAL_RETURN }}'
          nav = '${{ steps.collect.outputs.NAV }}'
          date = '${{ steps.collect.outputs.DATE }}'

          message = f'''
          📊 量化轮动日报

          日期：{date}
          单位净值：{nav}
          日涨跌：{daily}%

          运行详情：https://github.com/maoshuochen/quant-rotation/actions
          '''

          url = f'https://api.telegram.org/bot{token}/sendMessage'
          requests.post(url, json={
              'chat_id': chat_id,
              'text': message.strip()
          })
          " 2>/dev/null || echo "Notification failed"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
