name: Daily Backtest

on:
  schedule:
    # 每天 UTC 0 点运行 (北京时间 8 点)
    - cron: '0 0 * * 1-5'  # 工作日运行
  workflow_dispatch:  # 手动触发

env:
  PYTHON_VERSION: '3.11'

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyarrow  # Parquet 支持

      - name: Cache data
        uses: actions/cache@v4
        with:
          path: |
            data/
            backtest_results/
          key: quant-data-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            quant-data-${{ runner.os }}-

      - name: Run incremental backtest
        run: |
          mkdir -p backtest_results data/raw
          python scripts/backtest_incremental.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Generate web data
        run: |
          python scripts/generate_web_data.py || echo "Generate web data skipped"

      - name: Generate history data
        run: |
          python scripts/generate_history_data.py

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Collect results
        id: collect
        run: |
          # 提取最新净值数据
          python -c "
          import pandas as pd
          df = pd.read_parquet('backtest_results/current.parquet')
          latest = df.iloc[-1]
          prev = df.iloc[-2] if len(df) > 1 else latest
          daily_return = (latest['value'] - prev['value']) / prev['value'] * 100
          total_return = (latest['value'] - df.iloc[0]['value']) / df.iloc[0]['value'] * 100
          print(f'DAILY_RETURN={daily_return:.4f}')
          print(f'TOTAL_RETURN={total_return:.4f}')
          print(f'NAV={latest[\"value\"]:.2f}')
          print(f'DATE={latest[\"date\"]}')
          " >> $GITHUB_OUTPUT

      - name: Commit and push results
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name != 'pull_request'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          destination_dir: .
          commit_message: |
            chore: auto update backtest and history data [skip ci]

            Date: ${{ steps.collect.outputs.DATE }}
            Daily: ${{ steps.collect.outputs.DAILY_RETURN }}%
            Total: ${{ steps.collect.outputs.TOTAL_RETURN }}%

          full_commit_message: true

      - name: Send notification (optional)
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          python -c "
          import os
          import requests

          token = os.environ.get('TELEGRAM_BOT_TOKEN')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID')

          if not token or not chat_id:
              print('Telegram 配置缺失，跳过通知')
              exit(0)

          daily = '${{ steps.collect.outputs.DAILY_RETURN }}'
          total = '${{ steps.collect.outputs.TOTAL_RETURN }}'
          nav = '${{ steps.collect.outputs.NAV }}'
          date = '${{ steps.collect.outputs.DATE }}'

          message = f'''
          📊 量化轮动日报

          日期：{date}
          单位净值：{nav}
          日涨跌：{daily}%

          运行详情：https://github.com/maoshuochen/quant-rotation/actions
          '''

          url = f'https://api.telegram.org/bot{token}/sendMessage'
          requests.post(url, json={
              'chat_id': chat_id,
              'text': message.strip()
          })
          " 2>/dev/null || echo "Notification failed"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  # 健康检查
  health-check:
    runs-on: ubuntu-latest
    needs: backtest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run health check
        run: |
          python scripts/health_check.py
        continue-on-error: true
