name: Daily Backtest & Data Update

on:
  schedule:
    # 每天 UTC 19 点运行 (北京时间凌晨 3 点，确保当日数据已更新)
    # 周一到周五运行，避开周末
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "backtest"
  cancel-in-progress: true

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ==================== 代码检出 ====================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Python 环境 ====================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            __pycache__/
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache raw data
        uses: actions/cache@v4
        with:
          path: data/raw/
          key: quant-rawdata-${{ runner.os }}-${{ hashFiles('data/raw/*.parquet') }}
          restore-keys: |
            quant-rawdata-${{ runner.os }}-

      - name: Cache backtest results
        uses: actions/cache@v4
        with:
          path: backtest_results/
          key: quant-backtest-${{ runner.os }}-${{ hashFiles('backtest_results/*.parquet') }}
          restore-keys: |
            quant-backtest-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ==================== 运行全量回测 ====================
      # 简化逻辑：始终运行全量回测，确保数据一致性
      # backtest_baostock.py 现在会同时更新 CSV 和 current.parquet
      - name: Run backtest
        run: |
          mkdir -p backtest_results data/raw
          python scripts/backtest_baostock.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Generate frontend data
        run: |
          python scripts/generate_data.py

      - name: Ensure split frontend JSON files exist
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          dist = Path("web/dist")
          data_path = dist / "data.json"
          if not data_path.exists():
              raise SystemExit("web/dist/data.json not found")

          data = json.loads(data_path.read_text(encoding="utf-8"))

          backtest_path = dist / "backtest.json"
          if not backtest_path.exists():
              backtest_path.write_text(
                  json.dumps(data.get("backtest", {}), ensure_ascii=False, indent=2),
                  encoding="utf-8",
              )

          history_path = dist / "history.json"
          if not history_path.exists():
              history_payload = {
                  "history": data.get("history", []),
                  "update_time": data.get("update_time", ""),
              }
              history_path.write_text(
                  json.dumps(history_payload, ensure_ascii=False, indent=2),
                  encoding="utf-8",
              )
          PY

      - name: Extract metrics
        id: collect
        run: |
          python -c "
          import pandas as pd
          df = pd.read_parquet('backtest_results/current.parquet')
          latest = df.iloc[-1]
          prev = df.iloc[-2] if len(df) > 1 else latest
          daily_return = (latest['value'] - prev['value']) / prev['value'] * 100
          total_return = (latest['value'] - df.iloc[0]['value']) / df.iloc[0]['value'] * 100
          sharpe = latest['sharpe'] if 'sharpe' in df.columns else 0
          max_dd = latest['max_dd'] if 'max_dd' in df.columns else 0
          print(f'DAILY_RETURN={daily_return:.4f}')
          print(f'TOTAL_RETURN={total_return:.4f}')
          print(f'SHARPE={sharpe:.2f}')
          print(f'MAX_DD={max_dd:.4f}')
          print(f'NAV={latest[\"value\"]:.2f}')
          print(f'DATE={pd.to_datetime(latest[\"date\"]).strftime(\"%Y-%m-%d\")}')
          " >> $GITHUB_OUTPUT

      - name: Copy web files to root for GitHub Pages
        run: |
          cp web/dist/index.html .
          cp web/dist/data.json .
          cp web/dist/ranking.json .
          if [ -f "web/dist/backtest.json" ]; then cp web/dist/backtest.json .; fi
          if [ -f "web/dist/history.json" ]; then cp web/dist/history.json .; fi
          cp -r web/dist/assets ./assets

      - name: Commit and push results
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add data/raw/ backtest_results/ web/dist/ index.html data.json ranking.json backtest.json history.json assets/
          git diff --staged --quiet || git commit -m "chore: update backtest data $(date -u +%Y-%m-%d)

          Metrics:
          - NAV: ${{ steps.collect.outputs.NAV }}
          - Daily: ${{ steps.collect.outputs.DAILY_RETURN }}%
          - Total: ${{ steps.collect.outputs.TOTAL_RETURN }}%
          - Sharpe: ${{ steps.collect.outputs.SHARPE }}
          - MaxDD: ${{ steps.collect.outputs.MAX_DD }}

          Generated with [Claude Code](https://claude.ai/code)
          via [Happy](https://happy.engineering)

          Co-Authored-By: Claude <noreply@anthropic.com>
          Co-Authored-By: Happy <yesreply@happy.engineering>"
          git push origin main

      - name: Send notification (optional)
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          python -c "
          import os
          import requests

          token = os.environ.get('TELEGRAM_BOT_TOKEN')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID')

          if not token or not chat_id:
              print('Telegram 配置缺失，跳过通知')
              exit(0)

          daily = '${{ steps.collect.outputs.DAILY_RETURN }}'
          total = '${{ steps.collect.outputs.TOTAL_RETURN }}'
          nav = '${{ steps.collect.outputs.NAV }}'
          date = '${{ steps.collect.outputs.DATE }}'

          message = f'''
          📊 量化轮动日报

          日期：{date}
          单位净值：{nav}
          日涨跌：{daily}%
          夏普比率：${{ steps.collect.outputs.SHARPE }}
          最大回撤：${{ steps.collect.outputs.MAX_DD }}

          运行详情：https://github.com/maoshuochen/quant-rotation/actions
          '''

          url = f'https://api.telegram.org/bot{token}/sendMessage'
          requests.post(url, json={
              'chat_id': chat_id,
              'text': message.strip()
          })
          " 2>/dev/null || echo "Notification failed"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
