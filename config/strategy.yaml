strategy:
  top_n: 5
  buffer_n: 8
  rebalance_frequency: "weekly"
  strict_weekly_execution: true
  lookback_pe: 2520
  momentum_window: 126

factor_model:
  baseline_name: "core_rotation_v2"
  # 主模型因子 - 仅 3 个有效因子
  active_factors:
    - momentum
    - trend
    - flow

# 因子权重（基于多目标贝叶斯优化结果）
factor_weights:
  momentum: 0.24    # 动量 - 6 月收益率
  trend: 0.40       # 趋势 - 均线位置
  flow: 0.36        # 资金流 - 成交量/北向/ETF
