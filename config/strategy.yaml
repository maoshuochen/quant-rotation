strategy:
  top_n: 5
  buffer_n: 7
  rebalance_frequency: "weekly"
  strict_weekly_execution: true
  lookback_pe: 2520
  momentum_window: 126

factor_model:
  baseline_name: "core_rotation_v4_price_strength"
  scoring_mode: "fixed"
  # 主模型因子 - 简化为价格强度 + 资金流
  active_factors:
    - price_strength
    - flow

price_strength_model:
  relative_strength_benchmark: "equal_weight_all"
  components:
    momentum: 0.1175
    relative_strength: 0.1175
    trend: 0.18
  overheat:
    enabled: true
    ma20_threshold: 0.10
    ma60_threshold: 0.18
    penalty_strength: 0.20

# 因子权重（price_strength / flow 正式基线）
factor_weights:
  price_strength: 0.415    # 价格强度 - strength + trend 合并
  flow: 0.585              # 资金流 - 成交量/量价/金额/活跃度

flow_subfactor_weights:
  volume_trend: 0.00
  price_volume_corr: 0.00
  amount_trend: 0.70
  flow_intensity: 0.30

flow_model:
  trend_filter:
    enabled: true
    downtrend_cap: 0.55
    weak_trend_multiplier: 0.75

alpha_optimization:
  target_weighting:
    mode: "equal"
    max_weight: 0.28
    min_weight: 0.10
