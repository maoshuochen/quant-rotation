strategy:
  top_n: 5
  buffer_n: 7
  rebalance_frequency: "weekly"
  strict_weekly_execution: true
  lookback_pe: 2520
  momentum_window: 126

factor_model:
  baseline_name: "core_rotation_v3_strength"
  # 主模型因子 - 当前 3 个有效因子（strength = momentum + relative_strength 组合）
  active_factors:
    - strength
    - trend
    - flow

strength_blend:
  momentum: 0.50
  relative_strength: 0.50

# 因子权重（strength / trend / flow 正式基线）
factor_weights:
  strength: 0.235          # 强度 - 动量与相对强弱各占 50%
  trend: 0.18              # 趋势 - 均线位置
  flow: 0.585              # 资金流 - 成交量/量价/金额/活跃度

flow_subfactor_weights:
  volume_trend: 0.35
  price_volume_corr: 0.10
  amount_trend: 0.35
  flow_intensity: 0.20
