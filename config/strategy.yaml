strategy:
  top_n: 5
  buffer_n: 7
  rebalance_frequency: "weekly"
  strict_weekly_execution: true
  lookback_pe: 2520
  momentum_window: 126

factor_model:
  baseline_name: "core_rotation_v3_strength"
  scoring_mode: "fixed"
  # 主模型因子 - 当前 3 个有效因子（strength = momentum + relative_strength 组合）
  active_factors:
    - strength
    - trend
    - flow

strength_blend:
  momentum: 0.50
  relative_strength: 0.50

# 因子权重（strength / trend / flow 正式基线）
factor_weights:
  strength: 0.235          # 强度 - 动量与相对强弱各占 50%
  trend: 0.18              # 趋势 - 均线位置
  flow: 0.585              # 资金流 - 成交量/量价/金额/活跃度

flow_subfactor_weights:
  volume_trend: 0.35
  price_volume_corr: 0.10
  amount_trend: 0.35
  flow_intensity: 0.20

alpha_optimization:
  relative_strength_benchmark: "equal_weight_all"
  overheat_penalty:
    enabled: true
    ma20_threshold: 0.10
    ma60_threshold: 0.18
    penalty_strength: 0.20
  conditional_flow:
    enabled: true
    downtrend_cap: 0.55
    weak_trend_multiplier: 0.75
  target_weighting:
    mode: "equal"
    max_weight: 0.28
    min_weight: 0.10
