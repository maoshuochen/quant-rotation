# Data Agent 配置文件

# 启用状态
enabled: true

# 调度配置
schedule:
  daily: "0 0 * * 1-5"  # 工作日 UTC 0 点
  weekly: "0 0 * * 1"   # 每周一
  monthly: "0 0 1 * *"  # 每月 1 日

# 阈值配置
thresholds:
  # 数据新鲜度阈值（小时）
  data_freshness_hours: 24

  # 缓存命中率阈值
  cache_hit_rate_min: 0.5

  # 数据完整性阈值
  data_completeness_min: 0.95

# 数据源配置
data_sources:
  primary: baostock
  backup: akshare

# 告警配置
alerts:
  on_error: true
  on_warning: false
  channels:
    - type: github_issue
      enabled: true
    - type: telegram
      enabled: false
